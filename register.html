<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | LawVerse</title>

    <link rel="stylesheet" href="register.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Segoe UI, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;

            background:
                linear-gradient(rgba(0, 0, 0, .7), rgba(0, 0, 0, .7)),
                url("https://images.unsplash.com/photo-1505664194779-8beaceb93744");

            background-size: cover;
            background-position: center;
        }

        .register-box {
            width: 360px;
            background: #fff;
            padding: 35px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .35);
        }

        .logo {
            font-size: 30px;
            font-weight: bold;
            color: #d4af37;
            margin-bottom: 15px;
        }

        .logo i {
            margin-right: 8px;
        }

        h2 {
            color: #111827;
            margin-bottom: 25px;
        }

        .input-box {
            display: flex;
            align-items: center;
            background: #f4f4f4;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 18px;
        }

        .input-box i {
            color: #d4af37;
            margin-right: 10px;
        }

        .input-box input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 13px;
            background: #111827;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: .3s;
        }

        button:hover {
            background: #d4af37;
            color: #111827;
        }

        .login-link {
            margin-top: 20px;
            font-size: 14px;
        }

        .login-link a {
            color: #d4af37;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="register-box">

        <div class="logo">
            <i class="fa-solid fa-scale-balanced"></i>
            LawVerse
        </div>

        <h2>Create Account</h2>

        <form>

            <div class="input-box">
                <i class="fa-solid fa-user"></i>
                <input type="text" placeholder="Full Name" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" placeholder="Email Address" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Password" required>
            </div>

            <button type="submit">
                Register
            </button>

        </form>

        <p class="login-link">
            Already have an account?
            <a href="login.html">Login</a>
        </p>

    </div>

</body>

</html>
